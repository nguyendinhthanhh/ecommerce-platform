version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce-platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: