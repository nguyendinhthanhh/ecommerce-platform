spring.application.name=ecommerce-backend

# PostgreSQL Configuration (AWS RDS)


spring.datasource.url=jdbc:postgresql://ecommerce-platform.c5qq2iau4vsb.ap-southeast-2.rds.amazonaws.com:5432/postgres?currentSchema=ecommerce-platform
spring.datasource.username=postgres
spring.datasource.password=SWD392for10points
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=ecommerce-platform

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.schemas=ecommerce-platform
spring.flyway.default-schema=ecommerce-platform


# Frontend URL
app.frontend.base-url=http://localhost:5173


# pgvector
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema=ecommerce-platform
spring.ai.vectorstore.pgvector.dimensions=384
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Google AI Gemini (API Key) - Chat only
spring.ai.google.genai.api-key=${GEMINI_API_KEY:AIzaSyAXnG8LUDXdaNjVSMoFqqqPrcbHhHjVBbo}
spring.ai.google.genai.transport=rest
spring.ai.google.genai.chat.options.model=gemma-3-27b-it
spring.ai.google.genai.chat.options.temperature=0.7

# Transformers Embedding Model (Local ONNX - all-MiniLM-L6-v2)
spring.ai.transformers.embedding.onnx.modelUri=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx
spring.ai.transformers.embedding.tokenizer.uri=https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json

ai.vector.threshold=0.3
ai.vector.top-k=5

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=ecommerce-platform-secret-key-for-jwt-token-generation-must-be-256-bits-long
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000


